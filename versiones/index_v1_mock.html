<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Brainy">
<meta name="theme-color" content="#F5F1E8">
<title>Brainy</title>
<style>
  :root {
    --bg:        #F5F1E8;  /* blanco roto / beige claro */
    --surface:   #FBF8F1;  /* tarjetas */
    --surface-2: #EFE9DB;  /* hover / segundos planos */
    --ink:       #4A4035;  /* texto principal marrón oscuro */
    --ink-soft:  #8A8070;  /* texto secundario */
    --ink-faint: #B5AC9C;  /* texto terciario */
    --sage:      #8A9A7B;  /* verde salvia (acento) */
    --sage-deep: #6E7E60;
    --clay:      #B79B7E;  /* marrón claro / arcilla */
    --line:      #E4DCCB;  /* bordes */
    --danger:    #B5705F;  /* terracota para vencidas */
    --shadow:    0 1px 2px rgba(74,64,53,.04), 0 8px 24px rgba(74,64,53,.06);
    --radius:    18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }

  .app { max-width: 560px; margin: 0 auto; padding: 0 18px 120px; }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 2px 8px;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand h1 { font-size: 30px; font-weight: 700; letter-spacing: -.5px; margin: 0; }
  .brand .dot { color: var(--sage); }
  .brand .sub { font-size: 13px; color: var(--ink-faint); }
  .icon-btn {
    width: 42px; height: 42px; border: none; background: var(--surface);
    border-radius: 50%; box-shadow: var(--shadow); color: var(--ink-soft);
    font-size: 18px; display: grid; place-items: center; cursor: pointer;
    transition: transform .12s ease, background .12s ease;
  }
  .icon-btn:active { transform: scale(.92); background: var(--surface-2); }

  /* ---------- Tabs categorías ---------- */
  .tabs {
    display: flex; gap: 8px; overflow-x: auto; padding: 12px 2px 6px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink-soft); padding: 8px 16px; border-radius: 999px;
    font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: all .15s ease; display: flex; align-items: center; gap: 7px;
  }
  .tab .cnt {
    font-size: 12px; color: var(--ink-faint); background: var(--surface-2);
    border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center;
  }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .tab.active .cnt { background: rgba(255,255,255,.18); color: var(--bg); }
  .tab .swatch { width: 9px; height: 9px; border-radius: 50%; }

  /* ---------- Lista ---------- */
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .task {
    background: var(--surface); border-radius: var(--radius); padding: 15px 16px;
    box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 13px;
    animation: rise .25s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .check {
    flex: 0 0 auto; width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--line); margin-top: 1px; cursor: pointer;
    display: grid; place-items: center; transition: all .15s ease; background: transparent;
  }
  .check:active { transform: scale(.85); }
  .check.done { background: var(--sage); border-color: var(--sage); }
  .check svg { width: 13px; height: 13px; opacity: 0; transition: opacity .15s; }
  .check.done svg { opacity: 1; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 16px; font-weight: 500; color: var(--ink); word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge .swatch { width: 7px; height: 7px; border-radius: 50%; }
  .countdown {
    font-size: 12.5px; font-weight: 600; color: var(--sage-deep);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .countdown.today { color: var(--clay); }
  .countdown.overdue { color: var(--danger); }
  .task .del {
    flex: 0 0 auto; border: none; background: none; color: var(--ink-faint);
    font-size: 16px; cursor: pointer; padding: 4px; opacity: .6;
  }

  /* ---------- Empty state ---------- */
  .empty { text-align: center; padding: 70px 20px; color: var(--ink-faint); }
  .empty .em { font-size: 40px; display: block; margin-bottom: 12px; opacity: .7; }
  .empty p { margin: 4px 0; font-size: 15px; }

  /* ---------- FAB ---------- */
  .fab {
    position: fixed; right: 22px; bottom: calc(26px + env(safe-area-inset-bottom));
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: var(--ink); color: var(--bg); font-size: 30px; font-weight: 300;
    box-shadow: 0 6px 20px rgba(74,64,53,.28); cursor: pointer; z-index: 30;
    display: grid; place-items: center; transition: transform .15s ease;
  }
  .fab:active { transform: scale(.9); }

  /* ---------- Bottom sheet ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(74,64,53,.32); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
    backdrop-filter: blur(2px);
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--bg); border-radius: 26px 26px 0 0;
    padding: 10px 20px calc(26px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-width: 560px; margin: 0 auto; max-height: 88vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .grabber { width: 38px; height: 5px; background: var(--line); border-radius: 999px; margin: 8px auto 18px; }
  .sheet h2 { font-size: 21px; margin: 0 0 18px; font-weight: 700; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-bottom: 7px; }
  .field input[type=text], .field input[type=date], .field select {
    width: 100%; border: 1px solid var(--line); background: var(--surface);
    border-radius: var(--radius-sm); padding: 13px 14px; font-size: 16px;
    color: var(--ink); font-family: inherit; -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--sage); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft);
    padding: 9px 15px; border-radius: 999px; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: all .15s ease;
  }
  .chip .swatch { width: 9px; height: 9px; border-radius: 50%; }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary {
    width: 100%; border: none; background: var(--sage); color: #fff;
    padding: 15px; border-radius: var(--radius-sm); font-size: 17px; font-weight: 600;
    cursor: pointer; margin-top: 6px; transition: transform .12s ease, background .12s;
  }
  .btn-primary:active { transform: scale(.98); background: var(--sage-deep); }
  .btn-ghost {
    width: 100%; border: 1px solid var(--line); background: transparent; color: var(--ink-soft);
    padding: 13px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500;
    cursor: pointer; margin-top: 10px;
  }

  /* ---------- Gestión categorías ---------- */
  .cat-row {
    display: flex; align-items: center; gap: 12px; padding: 13px 4px;
    border-bottom: 1px solid var(--line);
  }
  .cat-row .swatch { width: 16px; height: 16px; border-radius: 50%; flex: 0 0 auto; }
  .cat-row .name { flex: 1; font-size: 16px; }
  .cat-row button { border: none; background: none; font-size: 15px; color: var(--ink-faint); cursor: pointer; padding: 6px; }
  .color-picker { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 4px; }
  .color-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-opt.sel { border-color: var(--ink); }

  /* ---------- Completadas section header ---------- */
  .section-title { font-size: 13px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .5px; margin: 24px 4px 6px; }
  .task.completed .task-title { text-decoration: line-through; color: var(--ink-faint); }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: calc(100px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--bg);
    padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <h1>Brainy<span class="dot">.</span></h1>
      <span class="sub" id="subtitle"></span>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn" id="btnCats" title="Categorías">☰</button>
      <button class="icon-btn" id="btnDone" title="Completadas">✓</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="list" id="list"></div>
</div>

<button class="fab" id="fab">+</button>

<!-- Overlay compartido -->
<div class="overlay" id="overlay"></div>

<!-- Sheet: agregar tarea -->
<div class="sheet" id="sheetAdd">
  <div class="grabber"></div>
  <h2>Nueva tarea</h2>
  <div class="field">
    <label>¿Qué tenés que hacer?</label>
    <input type="text" id="inTitle" placeholder="Ej: estudiar para el parcial" autocomplete="off">
  </div>
  <div class="field">
    <label>Categoría</label>
    <div class="chips" id="chipsCat"></div>
  </div>
  <div class="field">
    <label>Fecha (opcional)</label>
    <input type="date" id="inDate">
  </div>
  <button class="btn-primary" id="saveTask">Agregar</button>
</div>

<!-- Sheet: completadas -->
<div class="sheet" id="sheetDone">
  <div class="grabber"></div>
  <h2>Completadas</h2>
  <div class="list" id="doneList"></div>
</div>

<!-- Sheet: gestión categorías -->
<div class="sheet" id="sheetCats">
  <div class="grabber"></div>
  <h2>Categorías</h2>
  <div id="catList"></div>
  <div class="field" style="margin-top:18px;">
    <label>Nueva categoría</label>
    <input type="text" id="inCatName" placeholder="Nombre" autocomplete="off">
    <div class="color-picker" id="colorPicker"></div>
  </div>
  <button class="btn-primary" id="addCat">Crear categoría</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Brainy — capa de datos (MOCK con localStorage)
   Cuando conectemos el backend, se reemplaza este objeto DB
   por llamadas fetch al Apps Script, manteniendo la misma API.
   ============================================================ */
const PALETTE = ["#8A9A7B","#B79B7E","#9CA9B5","#C2A878","#A8806F","#7E9A93","#B58A9C","#8C8AA0"];

const DB = {
  _read(k, def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  _write(k, v) { localStorage.setItem(k, JSON.stringify(v)); },

  getTareas()      { return this._read("brainy_tasks", null) ?? this._seedTasks(); },
  getCategorias()  { return this._read("brainy_cats", null) ?? this._seedCats(); },
  saveTareas(t)    { this._write("brainy_tasks", t); },
  saveCategorias(c){ this._write("brainy_cats", c); },

  _seedCats() {
    const c = [
      { nombre: "Globant",  color: PALETTE[0] },
      { nombre: "Facu",     color: PALETTE[1] },
      { nombre: "Personal", color: PALETTE[2] },
    ];
    this.saveCategorias(c); return c;
  },
  _seedTasks() {
    const today = new Date();
    const d = (n) => { const x = new Date(today); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
    const t = [
      { id: id(), titulo: "Final de Finanzas", categoria: "Facu", fecha: d(12), completada: false, fechaCompletada: "", ts: Date.now() },
      { id: id(), titulo: "Entregar reporte de horas", categoria: "Globant", fecha: d(1), completada: false, fechaCompletada: "", ts: Date.now() },
      { id: id(), titulo: "Comprar regalo cumple", categoria: "Personal", fecha: d(4), completada: false, fechaCompletada: "", ts: Date.now() },
      { id: id(), titulo: "Renovar la SUBE", categoria: "Personal", fecha: "", completada: false, fechaCompletada: "", ts: Date.now() },
      { id: id(), titulo: "Parcial de Marketing", categoria: "Facu", fecha: d(0), completada: false, fechaCompletada: "", ts: Date.now() },
    ];
    this.saveTareas(t); return t;
  }
};
function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ============================================================
   Estado de la UI
   ============================================================ */
let tasks = DB.getTareas();
let cats  = DB.getCategorias();
let activeTab = "__all__";
let selectedCat = null;   // para el sheet de agregar
let selectedColor = PALETTE[0];

const $ = (s) => document.querySelector(s);

/* ---------- Countdown ---------- */
function daysUntil(fecha) {
  if (!fecha) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(fecha + "T00:00:00");
  return Math.round((target - today) / 86400000);
}
function countdownLabel(fecha) {
  const n = daysUntil(fecha);
  if (n === null) return null;
  if (n === 0)  return { txt: "Hoy", cls: "today" };
  if (n === 1)  return { txt: "Mañana", cls: "" };
  if (n > 1)    return { txt: `En ${n} días`, cls: "" };
  if (n === -1) return { txt: "Venció ayer", cls: "overdue" };
  return { txt: `Venció hace ${Math.abs(n)} días`, cls: "overdue" };
}
function catColor(nombre) { const c = cats.find(c => c.nombre === nombre); return c ? c.color : "#B5AC9C"; }

/* ---------- Render tabs ---------- */
function renderTabs() {
  const tabs = $("#tabs");
  const activeTasks = tasks.filter(t => !t.completada);
  let html = `<button class="tab ${activeTab==="__all__"?"active":""}" data-tab="__all__">Todas <span class="cnt">${activeTasks.length}</span></button>`;
  cats.forEach(c => {
    const n = activeTasks.filter(t => t.categoria === c.nombre).length;
    html += `<button class="tab ${activeTab===c.nombre?"active":""}" data-tab="${c.nombre}">
      <span class="swatch" style="background:${c.color}"></span>${c.nombre} <span class="cnt">${n}</span></button>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll(".tab").forEach(b => b.onclick = () => { activeTab = b.dataset.tab; render(); });
}

/* ---------- Render lista principal ---------- */
function render() {
  renderTabs();
  const list = $("#list");
  let items = tasks.filter(t => !t.completada);
  if (activeTab !== "__all__") items = items.filter(t => t.categoria === activeTab);

  // orden: con fecha primero (asc), sin fecha al final
  items.sort((a,b) => {
    if (!a.fecha && !b.fecha) return b.ts - a.ts;
    if (!a.fecha) return 1;
    if (!b.fecha) return -1;
    return a.fecha.localeCompare(b.fecha);
  });

  const total = tasks.filter(t=>!t.completada).length;
  $("#subtitle").textContent = total === 0 ? "todo en orden" : `${total} pendiente${total>1?"s":""}`;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty"><span class="em">🌿</span><p>Nada por acá.</p><p>Tu cabeza puede descansar.</p></div>`;
    return;
  }
  list.innerHTML = items.map(t => taskHTML(t)).join("");
  bindTaskEvents(list);
}

function taskHTML(t, completed=false) {
  const cd = countdownLabel(t.fecha);
  return `<div class="task ${completed?"completed":""}" data-id="${t.id}">
    <button class="check ${completed?"done":""}" data-act="toggle">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="task-body">
      <div class="task-title">${escapeHtml(t.titulo)}</div>
      <div class="task-meta">
        <span class="badge" style="background:${hexA(catColor(t.categoria),.16)}; color:${shade(catColor(t.categoria))}">
          <span class="swatch" style="background:${catColor(t.categoria)}"></span>${escapeHtml(t.categoria)}</span>
        ${cd ? `<span class="countdown ${cd.cls}">🕓 ${cd.txt}</span>` : ""}
      </div>
    </div>
    ${completed ? `<button class="del" data-act="delete">🗑</button>` : ""}
  </div>`;
}

function bindTaskEvents(container) {
  container.querySelectorAll(".task").forEach(el => {
    const tid = el.dataset.id;
    el.querySelector('[data-act="toggle"]').onclick = () => toggleTask(tid);
    const del = el.querySelector('[data-act="delete"]');
    if (del) del.onclick = () => deleteTask(tid);
  });
}

/* ---------- Acciones ---------- */
function toggleTask(tid) {
  const t = tasks.find(x => x.id === tid);
  if (!t) return;
  t.completada = !t.completada;
  t.fechaCompletada = t.completada ? new Date().toISOString().slice(0,10) : "";
  DB.saveTareas(tasks);
  if (t.completada) toast("Listo ✓");
  render();
  if (!$("#sheetDone").classList.contains("open")) return;
  renderDone();
}
function deleteTask(tid) {
  tasks = tasks.filter(x => x.id !== tid);
  DB.saveTareas(tasks);
  renderDone(); render();
  toast("Borrada");
}
function addTask() {
  const titulo = $("#inTitle").value.trim();
  if (!titulo) { toast("Escribí un título"); return; }
  if (!selectedCat) selectedCat = cats[0]?.nombre;
  tasks.push({ id: id(), titulo, categoria: selectedCat, fecha: $("#inDate").value || "", completada: false, fechaCompletada: "", ts: Date.now() });
  DB.saveTareas(tasks);
  closeSheets();
  render();
  toast("Agregada");
}

/* ---------- Completadas ---------- */
function renderDone() {
  const done = tasks.filter(t => t.completada).sort((a,b)=> (b.fechaCompletada||"").localeCompare(a.fechaCompletada||""));
  const el = $("#doneList");
  if (done.length === 0) { el.innerHTML = `<div class="empty"><span class="em">🍃</span><p>Todavía no completaste nada.</p></div>`; return; }
  el.innerHTML = done.map(t => taskHTML(t, true)).join("");
  bindTaskEvents(el);
}

/* ---------- Categorías ---------- */
function renderCatChips() {
  const wrap = $("#chipsCat");
  wrap.innerHTML = cats.map(c =>
    `<button class="chip ${selectedCat===c.nombre?"active":""}" data-cat="${c.nombre}">
      <span class="swatch" style="background:${c.color}"></span>${escapeHtml(c.nombre)}</button>`).join("");
  wrap.querySelectorAll(".chip").forEach(b => b.onclick = () => {
    selectedCat = b.dataset.cat; renderCatChips();
  });
}
function renderColorPicker() {
  $("#colorPicker").innerHTML = PALETTE.map(c =>
    `<div class="color-opt ${selectedColor===c?"sel":""}" style="background:${c}" data-c="${c}"></div>`).join("");
  $("#colorPicker").querySelectorAll(".color-opt").forEach(o => o.onclick = () => { selectedColor = o.dataset.c; renderColorPicker(); });
}
function renderCatList() {
  const el = $("#catList");
  el.innerHTML = cats.map((c,i) =>
    `<div class="cat-row" data-i="${i}">
      <span class="swatch" style="background:${c.color}"></span>
      <span class="name">${escapeHtml(c.nombre)}</span>
      <button data-act="rename">✎</button>
      <button data-act="del">🗑</button>
    </div>`).join("");
  el.querySelectorAll(".cat-row").forEach(row => {
    const i = +row.dataset.i;
    row.querySelector('[data-act="rename"]').onclick = () => renameCat(i);
    row.querySelector('[data-act="del"]').onclick = () => delCat(i);
  });
}
function addCat() {
  const nombre = $("#inCatName").value.trim();
  if (!nombre) { toast("Poné un nombre"); return; }
  if (cats.some(c => c.nombre.toLowerCase() === nombre.toLowerCase())) { toast("Ya existe"); return; }
  cats.push({ nombre, color: selectedColor });
  DB.saveCategorias(cats);
  $("#inCatName").value = "";
  selectedColor = PALETTE[cats.length % PALETTE.length];
  renderCatList(); renderColorPicker(); renderTabs();
  toast("Categoría creada");
}
function renameCat(i) {
  const nuevo = prompt("Nuevo nombre:", cats[i].nombre);
  if (!nuevo || !nuevo.trim()) return;
  const viejo = cats[i].nombre;
  cats[i].nombre = nuevo.trim();
  tasks.forEach(t => { if (t.categoria === viejo) t.categoria = nuevo.trim(); });
  DB.saveCategorias(cats); DB.saveTareas(tasks);
  renderCatList(); render();
}
function delCat(i) {
  const c = cats[i];
  const enUso = tasks.filter(t => t.categoria === c.nombre && !t.completada).length;
  if (enUso > 0) { toast(`Tiene ${enUso} tarea(s) activas`); return; }
  if (cats.length === 1) { toast("Dejá al menos una"); return; }
  cats.splice(i,1);
  DB.saveCategorias(cats);
  if (activeTab === c.nombre) activeTab = "__all__";
  renderCatList(); render();
  toast("Categoría borrada");
}

/* ---------- Sheets ---------- */
function openSheet(which) {
  $("#overlay").classList.add("open");
  $(which).classList.add("open");
}
function closeSheets() {
  $("#overlay").classList.remove("open");
  document.querySelectorAll(".sheet").forEach(s => s.classList.remove("open"));
}

/* ---------- Utils ---------- */
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function hexA(hex, a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function shade(hex){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r*=.55;g*=.55;b*=.55; return `rgb(${r|0},${g|0},${b|0})`; }
let toastTimer;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600); }

/* ---------- Wire up ---------- */
$("#fab").onclick = () => { $("#inTitle").value=""; $("#inDate").value=""; selectedCat = activeTab!=="__all__"?activeTab:cats[0]?.nombre; renderCatChips(); openSheet("#sheetAdd"); setTimeout(()=>$("#inTitle").focus(),300); };
$("#saveTask").onclick = addTask;
$("#btnDone").onclick = () => { renderDone(); openSheet("#sheetDone"); };
$("#btnCats").onclick = () => { selectedColor = PALETTE[cats.length % PALETTE.length]; renderCatList(); renderColorPicker(); openSheet("#sheetCats"); };
$("#addCat").onclick = addCat;
$("#overlay").onclick = closeSheets;
$("#inTitle").addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });

render();
</script>
</body>
